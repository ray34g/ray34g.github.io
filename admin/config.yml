# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms@0.171.1/schema/sveltia-cms.json

backend:
  name: github
  repo: ray34g/ray34g-personal-website
  branch: main
  base_url: https://cms-auth.ray34g.com
  auth_methods: [oauth]
  squash_merges: true

site_url: https://www.ray34g.com
display_url: https://www.ray34g.com
logo:
  src: /images/icon.svg
  show_in_header: true
media_folder: assets/images
public_folder: /images

output:
  omit_empty_optional_fields: true

singletons:
  - name: home_ja
    label: 1. トップページ（日本語）
    icon: home
    file: content/_index.ja.md
    media_folder: /assets/images
    public_folder: /images
    fields: &home_fields
      - { name: title, label: Title / ページタイトル, widget: string }
      - { name: linkTitle, label: Navigation label / ナビゲーション表示, widget: string }
      - { name: weight, label: Weight, widget: hidden, default: 1 }
      - { name: layout, label: Layout, widget: hidden, default: home }
      - label: Hero / メインビジュアル
        name: hero
        widget: object
        collapsed: false
        fields:
          - { name: heading, label: Heading / 見出し, widget: string }
          - { name: name, label: Name / 表示名, widget: string }
          - { name: description, label: Description / 説明, widget: text }
          - name: profile
            label: Profile image / プロフィール画像
            widget: image
            hint: 正方形の画像を使用してください。
          - name: background
            label: Background image / 背景画像
            widget: image
            hint: 横長の画像を推奨します。
      - label: Home sections / 表示セクション
        name: home_sections
        widget: object
        collapsed: true
        fields:
          - { name: about, label: About, widget: boolean, default: false }
          - { name: latest_posts, label: Latest posts, widget: boolean, default: false }
      - { name: body, label: Body / 補足本文, widget: markdown, required: false }

  - name: home_en
    label: 2. Home page (English)
    icon: home
    file: content/_index.en.md
    media_folder: /assets/images
    public_folder: /images
    fields: *home_fields

  - divider: true

  - name: brand
    label: 3. Brand links / ブランド情報
    icon: brand_awareness
    file: data/site/brand.toml
    format: toml
    fields:
      - { name: copyright_name, label: Copyright name, widget: string }
      - { name: copyright_url, label: Copyright URL, widget: string, pattern: ['^https://.+', 'https:// で始まるURLを入力してください'] }
      - { name: github_url, label: GitHub URL, widget: string, pattern: ['^https://.+', 'https:// で始まるURLを入力してください'] }
      - { name: powered_by_url, label: Powered-by URL, widget: string, pattern: ['^https://.+', 'https:// で始まるURLを入力してください'] }
      - { name: powered_by_label, label: Powered-by label, widget: string }
