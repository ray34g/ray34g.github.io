version: "3.8"

services:
  workspace:
    build:
      context: ${PWD:-.}
      dockerfile: ${PWD:-.}/Containerfile
      target: dev

    command: ["bash", "-lc", "sleep infinity"]
    # The interactive devcontainer intentionally runs as root. The GitHub
    # Actions runner image still uses the runner user in the final stage.
    user: "0:0"

    volumes:
      - ${PWD:-.}:/workspaces/ray34g.github.io
      - ${SSH_AGENT_SOCK:-$HOME/.ssh/agent.sock}:/ssh-agent
      - type: volume
        source: codex-home
        target: /home/runner/.codex

    environment:
      SSH_AUTH_SOCK: /ssh-agent

    working_dir: /workspaces/ray34g.github.io
    tty: true

  nginx:
    image: docker.io/library/nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    command: ["nginx", "-g", "daemon off;"]
    volumes:
      - ${PWD:-.}/public:/usr/share/nginx/html:ro
      - ${PWD:-.}/.devcontainer/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    working_dir: /usr/share/nginx/html
    tty: true

volumes:
  codex-home:
    name: codex-home-ray34g-github-io
