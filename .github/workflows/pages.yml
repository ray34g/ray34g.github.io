name: Build & Deploy static site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read          # checkout 用
  pages: write            # ページ公開
  id-token: write         # OIDC for Pages

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: gha-runner-scale-set-ray34g-github-io
    container:
      image: ghcr.io/ray34g/arc-runner-node-hugo:node24.18.0-hugo0.163.3

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/configure-pages@v5

      - name: Build site with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Asia/Tokyo
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          ./ci/scripts/build_pages.sh public

      - name: Verify generated pages
        run: |
          set -euo pipefail
          ./ci/scripts/verify_pages.sh public

      - name: Run internal link checker
        run: |
          set -euo pipefail
          hugo server --environment production --minify --disableLiveReload --baseURL=http://127.0.0.1:1314/ --bind=127.0.0.1 --port=1314 --renderToMemory --noTimes >/tmp/hugo-server.log 2>&1 &
          pid=$!
          trap 'kill $pid 2>/dev/null || true' EXIT
          curl -fsS --retry 30 --retry-connrefused --retry-delay 1 http://127.0.0.1:1314/ >/dev/null
          blc http://127.0.0.1:1314/ --filter-level 2 --exclude-external --recursive --verbose

      - name: Run Lighthouse CI (non-blocking)
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v10
        with:
          uploadArtifacts: true
          temporaryPublicStorage: false
          configPath: ".lighthouserc.json"

      - name: Resolve links in public
        run: |
          set -euo pipefail
          mv public public_orig
          mkdir -p public
          tar -C public_orig --hard-dereference -cf - . | tar -C public -xf -
          echo "Link dereference done"

      - name: Upload github-pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ./public

  # ────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: gha-runner-scale-set-ray34g-github-io
    container:
      image: ghcr.io/ray34g/arc-runner-node-hugo:node24.18.0-hugo0.163.3
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          preview: false
